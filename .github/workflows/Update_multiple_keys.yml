name: Update appsettings.json keys

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: 'ClientId (leave blank to skip)'
        required: false
      authority:
        description: 'Authority URL (leave blank to skip)'
        required: false
      realm:
        description: 'Realm (leave blank to skip)'
        required: false
      environment:
        description: 'Environment (leave blank to skip)'
        required: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read current values
        run: |
          echo "Current ClientId        : $(jq -r '.KeyCloakOidc.ClientId' appsettings.json)"
          echo "Current Authority       : $(jq -r '.KeyCloakOidc.Authority' appsettings.json)"
          echo "Current Realm           : $(jq -r '.KeyCloakOidc.Realm' appsettings.json)"

      - name: Backup current values
        run: |
          echo "=== Backup $(date) ===" >> appsettings_backup.txt
          echo "ClientId  : $(jq -r '.KeyCloakOidc.ClientId' appsettings.json)" >> appsettings_backup.txt
          echo "Authority : $(jq -r '.KeyCloakOidc.Authority' appsettings.json)" >> appsettings_backup.txt
          echo "Realm     : $(jq -r '.KeyCloakOidc.Realm' appsettings.json)" >> appsettings_backup.txt

      - name: Update keys (only if value provided)
        run: |
          cp appsettings.json tmp.json

          if [ -n "${{ github.event.inputs.client_id }}" ]; then
            jq --arg val "${{ github.event.inputs.client_id }}" \
              '.ClientId = $val | .KeyCloakOidc.ClientId = $val' tmp.json > out.json && mv out.json tmp.json
            echo "✅ Updated ClientId"
          fi

          if [ -n "${{ github.event.inputs.authority }}" ]; then
            jq --arg val "${{ github.event.inputs.authority }}" \
              '.KeyCloakOidc.Authority = $val' tmp.json > out.json && mv out.json tmp.json
            echo "✅ Updated Authority"
          fi

          if [ -n "${{ github.event.inputs.realm }}" ]; then
            jq --arg val "${{ github.event.inputs.realm }}" \
              '.KeyCloakOidc.Realm = $val' tmp.json > out.json && mv out.json tmp.json
            echo "✅ Updated Realm"
          fi

          mv tmp.json appsettings.json

      - name: Print result
        run: |
          echo "==============================="
          echo "Updated appsettings.json:"
          echo "==============================="
          cat appsettings.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appsettings.json appsettings_backup.txt
          git diff --staged --quiet || git commit -m "chore: update appsettings keys"
          git push https://x-access-token:${{ secrets.APPSETTINGS_SAMPLE_PAT }}@github.com/vivekg2287749/sample_appsettings.git
