name: Update ClientId in appsettings.json

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Enter new ClientId value'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update ClientId
        run: |
          jq --arg val "${{ github.event.inputs.client_id }}" '.ClientId = $val' appsettings.json > tmp.json && mv tmp.json appsettings.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appsettings.json
          git diff --staged --quiet || git commit -m "chore: update ClientId to ${{ github.event.inputs.client_id }}"
          git push https://x-access-token:${{ secrets.APPSETTINGS_SAMPLE_PAT }}@github.com/vivekg2287749/sample_appsettings.git
