name: Update ClientId in appsettings.json

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Enter new ClientId value'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read current ClientId
        run: |
          OLD_CLIENT_ID=$(jq -r '.ClientId' appsettings.json)
          OLD_KEYCLOAK_CLIENT_ID=$(jq -r '.KeyCloakOidc.ClientId' appsettings.json)
          echo "Top level ClientId: $OLD_CLIENT_ID"
          echo "KeyCloakOidc ClientId: $OLD_KEYCLOAK_CLIENT_ID"
          echo "OLD_CLIENT_ID=$OLD_CLIENT_ID" >> $GITHUB_ENV
          echo "OLD_KEYCLOAK_CLIENT_ID=$OLD_KEYCLOAK_CLIENT_ID" >> $GITHUB_ENV

      - name: Backup old ClientId to text file
        run: |
          echo "Backup - Date: $(date) | ClientId: ${{ env.OLD_CLIENT_ID }} | KeyCloakOidc.ClientId: ${{ env.OLD_KEYCLOAK_CLIENT_ID }}" >> clientid_backup.txt

      - name: Update ClientId with new value
        run: |
          jq --arg val "${{ github.event.inputs.client_id }}" \
            '.ClientId = $val | .KeyCloakOidc.ClientId = $val' \
            appsettings.json > tmp.json && mv tmp.json appsettings.json

      - name: Print result
        run: |
          echo "==============================="
          echo "Old top level ClientId   : ${{ env.OLD_CLIENT_ID }}"
          echo "Old KeyCloakOidc ClientId: ${{ env.OLD_KEYCLOAK_CLIENT_ID }}"
          echo "New value for both       : ${{ github.event.inputs.client_id }}"
          echo "==============================="
          cat appsettings.json

      - name: Backup print result to file
        run: |
          echo "===============================" >> clientid_backup.txt
          echo "Date     : $(date)" >> clientid_backup.txt
          echo "Old top level ClientId   : ${{ env.OLD_CLIENT_ID }}" >> clientid_backup.txt
          echo "Old KeyCloakOidc ClientId: ${{ env.OLD_KEYCLOAK_CLIENT_ID }}" >> clientid_backup.txt
          echo "New value for both       : ${{ github.event.inputs.client_id }}" >> clientid_backup.txt
          echo "Updated appsettings.json :" >> clientid_backup.txt
          cat appsettings.json >> clientid_backup.txt
          echo "===============================" >> clientid_backup.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appsettings.json clientid_backup.txt
          git diff --staged --quiet || git commit -m "chore: update ClientId from ${{ env.OLD_CLIENT_ID }} to ${{ github.event.inputs.client_id }}"
          git push https://x-access-token:${{ secrets.APPSETTINGS_SAMPLE_PAT }}@github.com/vivekg2287749/sample_appsettings.git
