name: Update ClientId to Test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-clientid:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update ClientId in appsettings.json
        run: |
          jq '.KeyCloakOidc.ClientId = "test"' appsettings.json > appsettings.tmp.json
          mv appsettings.tmp.json appsettings.json

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appsettings.json
          git diff --cached --quiet || git commit -m "chore: update KeyCloakOidc ClientId to test"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
