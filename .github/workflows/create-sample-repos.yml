name: Update ClientId in appsettings.json

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Change ClientId to test
        run: |
          jq '.ClientId = "test"' appsettings.json > tmp.json && mv tmp.json appsettings.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appsettings.json
          git diff --staged --quiet || git commit -m "chore: update ClientId to test"
          git push https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/vivekg2287749/central-config.git
