name: Appsettings Sample Repos

on:
  workflow_dispatch:

jobs:
  create-repos:
    runs-on: ubuntu-latest

    steps:
      - name: Create common-config repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/repos \
            -d '{"name":"common-config","description":"Shared config source of truth","private":false,"auto_init":true}'

      - name: Create app-api repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/repos \
            -d '{"name":"app-api","description":"Backend app","private":false,"auto_init":true}'

      - name: Create app-frontend repo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/repos \
            -d '{"name":"app-frontend","description":"Frontend app","private":false,"auto_init":true}'
