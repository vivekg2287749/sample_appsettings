name: Copy private repo to organization repo

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private-repo

      - name: Checkout organization repo
        uses: actions/checkout@v4
        with:
          repository: YOUR_ORG_NAME/YOUR_ORG_REPO   # ← change this
          token: ${{ secrets.APPSETTINGS_SAMPLE_PAT }}
          path: org-repo

      - name: Copy private repo into org repo as folder
        run: |
          cp -r private-repo org-repo/sample_appsettings

      - name: Commit and push to org repo
        run: |
          cd org-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: copy private repo to org"
          git push
